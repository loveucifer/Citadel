name: citadel
description: "A fully open source, demonstrably fast, and verifiably free forever messenger."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0' # Updated to a modern SDK constraint

dependencies:
  flutter:
    sdk: flutter

  # Core Functionality
  # For P2P networking (as per your blueprint [F1])
  # Note: A mature, all-in-one libp2p package for Flutter is still evolving.
  # We will structure our code to accommodate it once available. For now, this is a placeholder.
  # dart_libp2p: ^0.1.0 # (Placeholder)
  
  # For secure on-device storage of the mnemonic phrase ([F4])
  flutter_secure_storage: ^9.0.0
  
  # For the encrypted local database ([F4])
  # Using sqflite with SQLCipher support
  sqflite_sqlcipher: ^2.1.0
  path_provider: ^2.0.11 # To find the correct local path for the database
  path: ^1.8.2

  # For Identity & Cryptography ([F2], [F3], [ID3])
  bip39: ^1.0.6
  pinenacl: ^0.4.1
  
  # UI & Utility
  cupertino_icons: ^1.0.8
  
  # A simple service locator for dependency injection to keep our code clean
  get_it: ^7.6.7
  
  # For state management to update the UI efficiently
  provider: ^6.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
